<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prem's Portfolio</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    /* Background for your main portfolio site */
    body {
      background-color: #f4f7f6;
      height: 100vh;
      padding: 50px;
    }

    /* Floating Chat Button */
    #chat-toggle-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      background-color: #4e4376;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.3s;
      z-index: 1000;
    }

    #chat-toggle-btn:hover {
      transform: scale(1.1);
    }

    /* Chat Container - Hidden by default */
    .chat-container {
      display: none; /* Hides the chat initially */
      position: fixed;
      bottom: 100px;
      right: 30px;
      width: 350px;
      max-height: 500px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      flex-direction: column;
      overflow: hidden;
      z-index: 1000;
    }

    .chat-header {
      background: linear-gradient(to right, #2b5876, #4e4376);
      color: white;
      padding: 15px 20px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .chat-box {
      height: 350px;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background-color: #fafafa;
    }

    .message {
      max-width: 85%;
      padding: 10px 15px;
      border-radius: 15px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .bot-message {
      background-color: #e9ecef;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 0;
    }

    .user-message {
      background-color: #4e4376;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 0;
    }

    .chat-input-container {
      display: flex;
      padding: 10px;
      background: #fff;
      border-top: 1px solid #ddd;
    }

    #user-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 20px;
      outline: none;
      font-size: 0.9rem;
    }

    #send-btn {
      background-color: #4e4376;
      color: white;
      border: none;
      padding: 8px 15px;
      margin-left: 8px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Welcome to Prem's Portfolio Website</h1>
  <p>Look at the bottom right corner to interact with the assistant!</p>

  <button id="chat-toggle-btn">💬</button>

  <div class="chat-container" id="chat-container">
    <div class="chat-header">
      Prem's Assistant
      <button class="close-btn" id="close-btn">✖</button>
    </div>
    <div class="chat-box" id="chat-box">
      <div class="message bot-message">
        Vanakkam! Ask me about Prem's skills, projects, events, or type 'certificates' to see his full list!
      </div>
    </div>
    <div class="chat-input-container">
      <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    // --- Toggle Chatbot Visibility ---
    const chatBtn = document.getElementById('chat-toggle-btn');
    const closeBtn = document.getElementById('close-btn');
    const chatContainer = document.getElementById('chat-container');

    chatBtn.addEventListener('click', () => {
      chatContainer.style.display = 'flex';
      chatBtn.style.display = 'none';
    });

    closeBtn.addEventListener('click', () => {
      chatContainer.style.display = 'none';
      chatBtn.style.display = 'block';
    });

    // --- Chatbot Logic ---
    class PortfolioBot {
      constructor() {
        this.knowledgeBase = {
          "hello": "Vanakkam! Ask me about Prem's skills, events, AI projects, or certificates!",
          "hi": "Hello there! How can I help you learn more about Prem today?",
          "skills": "Prem has a solid foundation in AI/ML and Java. He uses Microsoft Azure, Power BI, and GitHub Copilot. Ask me about his 'projects' or 'os knowledge'!",
          "os": "Prem has a deep understanding of Operating Systems, particularly in core concepts like memory management, process scheduling, and synchronization.",
          "events": "Prem organized a major college AI/ML technical symposium in Feb 2026 (including posters and videos!) and coordinated a departmental Industrial Visit in Coimbatore.",
          "coimbatore": "Prem planned a fantastic one-day Industrial Visit and tourist trip for his department in Coimbatore back in February 2026.",
          "projects": "He is currently building this interactive portfolio! Prem also has experience designing AI/ML solutions and creating portfolio websites for others, like Vijayalakshmi R.",
          "java": "Prem loves Java programming! He is skilled in everything from the basics to working with data structures like finding duplicate elements in arrays.",
          "tamil": "ஆமாம், பிரேம் தமிழ் பேசுவார்! (Yes, Prem speaks Tamil!)",
          "certificates": this.getCertificates(),
          "certificate": this.getCertificates()
        };
      }

      getCertificates() {
        const certList = [
          "1. Microsoft Certified: Azure Fundamentals (AZ-900)",
          "2. Microsoft Power BI Data Analyst Associate (PL-300)",
          "3. DeepLearning.AI Machine Learning Specialization",
          "4. Complete Java Programming Masterclass",
          "5. GitHub Copilot & AI Coding Assistant Certification",
          "6. Operating Systems Concepts & Architecture",
          "7. Python for Data Science and Machine Learning",
          "8. Advanced SQL & Database Management",
          "9. Introduction to Artificial Intelligence (IBM)",
          "10. Cloud Computing Core Concepts",
          "11. Data Structures & Algorithms in Java",
          "12. Frontend Web Development (HTML/CSS/JS)",
          "13. Enterprise Design Thinking Practitioner",
          "14. Agile Project Management Principles",
          "15. Neural Networks and Deep Learning",
          "16. Data Visualization with Tableau & Power BI",
          "17. Version Control with Git and GitHub",
          "18. Object-Oriented Programming (OOP) Principles",
          "19. Natural Language Processing (NLP) Basics",
          "20. Cybersecurity Fundamentals",
          "21. Leadership & Technical Event Management",
          "22. API Integration and Backend Development",
          "23. Computer Networks and Communication"
        ];
        return `<strong>Prem has 23 certifications:</strong><br><br>` + certList.join('<br>');
      }

      getResponse(userInput) {
        let lowerInput = userInput.toLowerCase();
        for (let key in this.knowledgeBase) {
          if (lowerInput.includes(key)) {
            return this.knowledgeBase[key];
          }
        }
        return "I'm still learning! Try asking about Prem's 'skills', 'events', 'java', 'tamil', or 'certificates'.";
      }
    }

    const myBot = new PortfolioBot();
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message');
      
      if (sender === 'user') {
        msgDiv.classList.add('user-message');
        msgDiv.textContent = text; 
      } else {
        msgDiv.classList.add('bot-message');
        msgDiv.innerHTML = text; 
      }
      
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleChat() {
      const userText = userInput.value.trim();
      if (userText === "") return;

      appendMessage(userText, 'user');
      userInput.value = '';

      const botResponse = myBot.getResponse(userText);

      setTimeout(() => {
        appendMessage(botResponse, 'bot');
      }, 400);
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        handleChat();
      }
    });
  </script>

</body>
</html>
